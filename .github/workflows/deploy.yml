name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
         script: |
  cd /home/ec2-user/Bibhuti_Test2026
  git fetch origin
  git reset --hard origin/main
  pkill -f gunicorn || true
  nohup gunicorn -w 2 -b 0.0.0.0:5000 app:app > gunicorn.log 2>&1 < /dev/null &